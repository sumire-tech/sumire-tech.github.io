<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Homepage</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
    }

    
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #333;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
    }

    
    .container {
      max-width: 900px;
      margin: 120px auto 40px;
      padding: 0 20px;
    }

    
    .profile-card {
      background-color: white;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      margin-bottom: 40px;
    }

    .profile-card h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .profile-card p {
      font-size: 1.1rem;
      color: #666;
    }

    /* My Works */
    .works-section {
      margin-top: 20px;
    }

    .works-section h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .work-card {
      background-color: white;
      border-radius: 15px;
      padding: 1.5rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div>My Homepage</div>
  </header>

  <div class="container">
    <div class="profile-card">
      <h1>Nakagawa Sumire</h1>
      <p>ouc B1</p>
    </div>

    <div class="works-section">
      <h2>My Works</h2>
      <div class="works-grid">
        <div class="work-card">Work 1</div>
        <div class="work-card">Work 2</div>
        <div class="work-card">Work 3</div>
        <div class="work-card">Work 4</div>
        <!-- 必要に応じて増やしてOK -->
      </div>
    </div>
  </div>

</body>
</html>
