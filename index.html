<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Homepage</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
    }

    /* ナビバー */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #333;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 1000;
      font-size: 1.2rem;
    }

    /* 全体の余白 */
    .container {
      max-width: 900px;
      margin: 120px auto 40px;
      padding: 0 20px;
    }

    /* プロフィールカード */
    .profile-card {
      background-color: white;
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: left; /* ← 左詰に変更 */
      margin-bottom: 40px;
    }

    .profile-card h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .profile-card p {
      font-size: 1.1rem;
      color: #666;
    }

    /* My Works */
    .works-section {
      margin-top: 20px;
    }

    .works-section h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .work-card {
      background-color: white;
      border-radius: 15px;
      padding: 1.5rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    My Homepage
  </header>

  <div class="container">
    <!-- プロフィール -->
    <div class="profile-card">
      <h1>Nakagawa Sumire</h1>
      <p>
        B1.人工知能,特に複数モダリティによる言語処理（マルチモーダルLM）に興味があります.<br>
        多趣味で,以下のようなことが好きです.<br>
        音楽全般（ピアノ・バイオリン演奏, ボカロ,ケルト音楽,クラシック,ゲームミュージック）,イラスト製作,(純粋）数学等.<br>
        
      </p>
    </div>

    <!-- My Works -->
    <div class="works-section">
      <h2>My Works</h2>
      <div class="works-grid">
        <div class="work-card">Work 1</div>
        <div class="work-card">Work 2</div>
        <div class="work-card">Work 3</div>
        <div class="work-card">Work 4</div>
        <!-- 必要に応じて追加可能 -->
      </div>
    </div>
  </div>

</body>
</html>
